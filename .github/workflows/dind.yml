name: Test Docker-in-Docker

on:
  workflow_dispatch:
  workflow_call:

env:
  DOCKER_REGISTRY_URL: ghcr.io

permissions:
  contents: read
  packages: read

jobs:
  dind-run-image-fails:
    name: DinD - Image (Fails)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/dind
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
    steps:
      - name: Docker Registry Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Image Action
        uses: a-magdy/test-gh-docker-actions/test-gh-docker/image@main

  dind-run-dockerfile-fails:
    name: DinD - Dockerfile (Fails)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/dind
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
    steps:
      - name: Docker Registry Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Dockerfile Action
        uses: a-magdy/test-gh-docker-actions/test-gh-docker/dockerfile@main

  dind-composite-action-succeeds:
    name: DinD - Composite (Succeeds)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dind-run-image-fails, dind-run-dockerfile-fails]
    container:
      image: ghcr.io/${{ github.repository_owner }}/dind
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Docker Registry Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test image
        shell: bash
        run: docker run --rm --platform linux/amd64 ${{ env.DOCKER_REGISTRY_URL }}/${{ github.repository_owner }}/ubuntu echo "Hello from Docker in DinD"
