name: "Docker Image Private Registry"
description: "Test Docker Image action with private registry"
# Forks: change 'a-magdy/gh-actions-docker-demo' in the image ref below to your repo after running build-images.
# Note: `image: docker://` fields do not support expressions — this must be a literal value.
# See: https://github.com/orgs/community/discussions/26399
runs:
  using: "docker"
  image: "docker://ghcr.io/a-magdy/gh-actions-docker-demo/ubuntu"
  args:
    - "/bin/sh"
    - "-c"
    - echo "Running from inside the Docker container"
